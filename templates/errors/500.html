{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem;">
  <div style="text-align:center;max-width:420px;">
    <div style="font-size:5rem;font-weight:900;color:var(--accent);line-height:1;">500</div>
    <h2 style="margin:.5rem 0 .75rem;">Something Went Wrong</h2>
    <p class="text-muted" style="margin-bottom:1.5rem;">
      An unexpected error occurred on our end. Please try again later.
      If the problem persists, contact the system administrator.
    </p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
      <i class="fas fa-home"></i> Return Home
    </a>
  </div>
</div>
{% endblock %}
