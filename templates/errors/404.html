{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem;">
  <div style="text-align:center;max-width:420px;">
    <div style="font-size:5rem;font-weight:900;color:var(--primary);line-height:1;">404</div>
    <h2 style="margin:.5rem 0 .75rem;">Page Not Found</h2>
    <p class="text-muted" style="margin-bottom:1.5rem;">
      The page you are looking for doesn't exist or has been moved.
    </p>
    <a href="javascript:history.back()" class="btn btn-outline" style="margin-right:.5rem;">
      <i class="fas fa-arrow-left"></i> Go Back
    </a>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
      <i class="fas fa-home"></i> Home
    </a>
  </div>
</div>
{% endblock %}
